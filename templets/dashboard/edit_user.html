{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- left side bar -->
     {% include 'dashboard/sidebar.html' %}

    <!-- right side content -->
     <div class="col-md-9">
        {% if perms.auth.add_user %}
        <h2>Edit User</h2>
        <form action="" method="POST">
            {% csrf_token %}

            {{ form | crispy}}

            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        {% else %}
        <h5>Why you are westing your time</h5>
        {% endif %}
     </div>
</div>


{% endblock %}
